version: "3.9"

services:
  postgres_test:
    image: postgres:16-alpine
    container_name: text2sql_test_db
    environment:
      POSTGRES_USER:     testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB:       text2sql_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d text2sql_test"]
      interval: 3s
      timeout: 3s
      retries: 10
